<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Personal Website</title>
        <style>
            :root {
                --text-color: #333333;
                --heading-color: #111111;
                --border-color: #e0d0a0;
                --link-color: #b25900;
                --toggle-bg: #fff0b3;

                /* Day theme background */
                --bg-color: #fffae6; /* sunny yellow */
                --bg-image: url('https://i.pinimg.com/1200x/91/7c/0c/917c0ceb7a081b16c4ae1e48f4838701.jpg')

            }

            [data-theme="dark"] {
                --text-color: #e0e0e0;
                --heading-color: #ffffff;
                --border-color: #1a2a4a;
                --link-color: #80b3ff;
                --toggle-bg: #0c265b;

                /* Dark theme background */
                --bg-color: #0a192f; 
                --bg-image: url('https://i.pinimg.com/736x/17/59/ef/1759ef7b65c45752b0d72aea35aeed53.jpg');
            }

           body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.6;
                max-width: 800px;
                margin: 40px auto;
                padding: 0 20px;
                color: var(--text-color);
                background-color: var(--bg-color);
                background-image: var(--bg-image);
                background-repeat: no-repeat;
                background-size: cover;

                transition: background-color 0.5s, color 0.5s;
            }
            
            h1, h2 {
                color: var(--heading-color); 
                border-bottom: 1px solid var(--border-color); 
                padding-bottom: 8px;
            }

            ul { list-style-type: square; padding-left: 20px; }
            li { margin-bottom: 8px; }

            .links a { 
                margin-right: 15px; 
                color: var(--link-color); 
                text-decoration: none; 
                font-weight: bold;
            }
            .links a:hover { text-decoration: underline; }
            .subtitle { font-style: italic; color: #666; display: block; margin-top: -10px; margin-bottom: 20px; }

            /* Theme toggle button style */
            .theme-toggle-btn {
                float: right;
                padding: 8px 12px;
                border: none;
                border-radius: 4px;
                background-color: var(--toggle-bg);
                color: var(--text-color);
                cursor: pointer;
                font-weight: bold;
                font-size: 14px;
            }
        </style>
    </head>
</html>
